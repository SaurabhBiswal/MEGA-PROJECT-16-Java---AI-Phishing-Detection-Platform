spring.application.name=phishguard-api

# Server configuration
server.port=${PORT:8080}

# ══════════════════════════════════════════════════
# Database Configuration (PostgreSQL - Neon DB)
# ══════════════════════════════════════════════════
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/neondb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) — optimized for Neon's serverless
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ══════════════════════════════════════════════════
# JWT Configuration
# ══════════════════════════════════════════════════
jwt.secret=${JWT_SECRET:PhishGuardSuperSecretKeyForJWTGeneration2026!@#$%^&*()}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ══════════════════════════════════════════════════
# Security APIs
# ══════════════════════════════════════════════════
virustotal.api.key=${VIRUSTOTAL_API_KEY:demo}
google.safebrowsing.api.key=${GOOGLE_SB_API_KEY:demo}

# ══════════════════════════════════════════════════
# CORS Configuration
# ══════════════════════════════════════════════════
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
